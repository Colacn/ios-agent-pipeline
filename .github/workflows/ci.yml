name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: koalaman/shellcheck-action@v0.9
        with:
          scandir: scripts
          extraargs: --external-sources

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke test (bootstrap + install layout)
        run: bash scripts/smoke-test.sh
